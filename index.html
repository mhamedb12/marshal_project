<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Green Store | Dashboard</title><link rel="stylesheet" href="../css/style.css"></head><body data-page="dashboard"><header class="site-header"><nav class="nav-shell"><a class="brand" href="index.html"><span class="brand-mark">✦</span><span>Green Store</span></a><div class="nav-actions"><a class="nav-link" href="marketplace.html" data-ar="السوق" data-en="Marketplace">السوق</a><span class="user-chip" id="userChip"></span><button class="icon-button" id="themeToggle" type="button">◐</button><button class="language-button" id="languageToggle" type="button">English</button><button class="logout-button" id="logoutButton" data-ar="خروج" data-en="Logout">خروج</button></div></nav></header><main><div class="section-shell notice" id="pageMessage" hidden></div><section class="dashboard-hero section-shell"><div><p class="eyebrow" data-ar="لوحة التحكم" data-en="Dashboard">لوحة التحكم</p><h1 data-ar="مساحتك الخضراء، بإدارتك." data-en="Your green space, managed your way.">مساحتك الخضراء، بإدارتك.</h1><p class="hero-text" data-ar="تابع منتجاتك وشاركها مع مجتمع محبي النباتات." data-en="Manage your products and share them with the plant community.">تابع منتجاتك وشاركها مع مجتمع محبي النباتات.</p><a class="primary-button" href="marketplace.html" data-ar="تصفح السوق" data-en="Browse marketplace">تصفح السوق</a></div><div class="dashboard-stat"><strong id="productCount">0</strong><span data-ar="منتجاتك المرفوعة" data-en="Your uploaded products">منتجاتك المرفوعة</span></div></section><section class="section-shell content-section" id="ownerArea"><div class="section-heading"><div><p class="eyebrow" data-ar="ملكية المالك" data-en="Owner inventory">ملكية المالك</p><h2 data-ar="منتجاتي المرفوعة" data-en="My uploaded products">منتجاتي المرفوعة</h2></div><a class="primary-button compact-button" href="#productForm" data-ar="إضافة منتج +" data-en="Add product +">إضافة منتج +</a></div><div class="product-grid" id="myProducts"></div></section><section class="section-shell owner-section" id="productForm"><div class="section-heading"><div><p class="eyebrow" data-ar="تحكم المالك" data-en="Owner controls">تحكم المالك</p><h2 data-ar="إدارة المنتج" data-en="Manage product">إدارة المنتج</h2></div></div><form class="admin-form" id="productFormElement"><input type="hidden" id="productId"><div class="field"><label data-ar="الاسم بالعربية" data-en="Arabic name">الاسم بالعربية</label><input id="nameAr" required></div><div class="field"><label data-ar="الاسم بالإنجليزية" data-en="English name">الاسم بالإنجليزية</label><input id="nameEn" required></div><div class="field"><label data-ar="التصنيف" data-en="Category">التصنيف</label><select id="category"><option>نباتات زينة</option><option>بذور</option><option>أسمدة</option></select></div><div class="field"><label data-ar="السعر" data-en="Price">السعر</label><input type="number" id="price" min="0" step="0.01" required></div><div class="field"><label data-ar="المخزون" data-en="Stock">المخزون</label><input type="number" id="stock" min="0" required></div><div class="field field-wide"><label data-ar="رابط الصورة" data-en="Image URL">رابط الصورة</label><input type="url" id="imageUrl"></div><div class="field"><label data-ar="الوصف بالعربية" data-en="Arabic description">الوصف بالعربية</label><textarea id="descriptionAr" rows="3"></textarea></div><div class="field"><label data-ar="الوصف بالإنجليزية" data-en="English description">الوصف بالإنجليزية</label><textarea id="descriptionEn" rows="3"></textarea></div><button class="primary-button form-submit" id="productSubmit" type="submit" data-ar="إضافة المنتج +" data-en="Add product +">إضافة المنتج +</button></form></section><section class="section-shell profile-section"><div class="section-heading"><div><p class="eyebrow" data-ar="حسابك" data-en="Your account">حسابك</p><h2 data-ar="تحديث الملف الشخصي" data-en="Update profile">تحديث الملف الشخصي</h2></div></div><form class="profile-form" id="profileForm"><input id="profileName" required><input type="email" id="profileEmail" required><input type="url" id="profilePic" placeholder="Profile image URL"><button class="primary-button" type="submit" data-ar="حفظ الملف" data-en="Save profile">حفظ الملف</button></form></section></main><script src="../js/script.js"></script></body></html>
